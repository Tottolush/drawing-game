<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>РИСУЕМ ВМЕСТЕ</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:none}
body{background:#0a0a0f;color:#fff;font-family:'Caveat',cursive;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.screen{display:none;width:100%;max-width:480px;padding:24px 20px;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* JOIN */
.title{font-size:42px;font-weight:700;color:#FFE600;text-shadow:0 0 40px #FFE60088,3px 3px 0 #b8a000;line-height:1.2;text-align:center;margin-bottom:8px}
.sub{font-size:22px;color:#666;margin-bottom:32px}
.lbl{font-size:20px;color:#FFE600;margin-bottom:8px;align-self:flex-start}
.inp{width:100%;background:#1a1a25;border:3px solid #333;border-radius:12px;padding:14px 18px;font-family:'Caveat',cursive;font-size:22px;font-weight:700;color:#fff;outline:none;margin-bottom:16px}
.inp:focus{border-color:#FFE600;box-shadow:0 0 20px #FFE60033}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-family:'Caveat',cursive;font-weight:700;font-size:22px;cursor:pointer;margin-top:10px;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-y{background:#FFE600;color:#0a0a0f;box-shadow:0 4px 0 #b8a000}
.btn-g{background:transparent;color:#555;border:2px solid #222;font-size:18px}

/* WAITING */
.waiting-icon{font-size:56px;margin-bottom:16px}
.waiting-title{font-size:36px;font-weight:700;color:#FFE600;margin-bottom:8px;text-align:center}
.waiting-sub{font-size:18px;color:#555;text-align:center;margin-bottom:24px}
.players-list{width:100%;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}
.player-chip{padding:8px 16px;border-radius:20px;font-size:18px;font-weight:700;background:#1a1a25;border:2px solid #2a2a35}

/* GAME */
#s-game{max-width:100vw;max-height:100vh;padding:0;height:100vh;justify-content:flex-start;overflow:hidden}
.game-area{flex:1;position:relative;width:100%;overflow:hidden}
#drawing-canvas{position:absolute;top:0;left:0;background:#fff}
#rope-canvas{position:absolute;top:0;left:0;pointer-events:none}

/* BOTTOM BAR */
.bottom-bar{width:100%;background:#0d0d18;border-top:2px solid #1a1a25;display:flex;flex-direction:column;align-items:center;padding:10px 0 14px;flex-shrink:0}
.rope-label{font-size:20px;font-weight:700;margin-bottom:8px}
.joystick-wrap{position:relative;width:70px;height:70px}
.jbase{width:70px;height:70px;border-radius:50%;background:#1a1a25;border:3px solid;position:absolute;touch-action:none}
.jknob{width:28px;height:28px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 12px}

/* ACTION BUTTONS */
.action-row{display:flex;gap:8px;margin-top:8px}
.act-btn{padding:6px 14px;border:none;border-radius:8px;font-family:'Caveat',cursive;font-weight:700;font-size:16px;cursor:pointer}
.act-r{background:#ff3b5c;color:#fff}
.act-g{background:#00ff88;color:#0a0a0f}
.act-b{background:#1a1a25;color:#666;border:2px solid #2a2a35}
</style>
</head>
<body>

<!-- JOIN -->
<div class="screen active" id="s-join">
  <div class="title">Командный рисовальщик</div>
  <div class="lbl" style="margin-top:24px">код комнаты</div>
  <input class="inp" id="room-id" placeholder="например: GAME1" maxlength="10" style="text-transform:uppercase"/>
  <button class="btn btn-y" onclick="joinRoom()">войти в комнату</button>
</div>

<!-- WAITING -->
<div class="screen" id="s-waiting">
  <div class="waiting-icon">⏳</div>
  <div class="waiting-title">ждём игроков</div>
  <div class="waiting-sub">когда все зайдут — жми старт</div>
  <div class="players-list" id="players-list"></div>
  <button class="btn btn-y" onclick="goToGame()">начать рисовать!</button>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <div class="game-area" id="game-area">
    <canvas id="drawing-canvas"></canvas>
    <canvas id="rope-canvas"></canvas>
  </div>
  <div class="bottom-bar">
    <div class="rope-label" id="rope-label" style="color:#FFE600">твоя верёвка</div>
    <div class="joystick-wrap">
      <div class="jbase" id="jbase" style="border-color:#FFE600"></div>
      <div class="jknob" id="jknob" style="background:#FFE600;box-shadow:0 0 12px #FFE600"></div>
    </div>
    <div class="action-row">
      <button class="act-btn act-r" onclick="sendCmd('penup')">✋ стоп</button>
      <button class="act-btn act-g" onclick="sendCmd('pendown')">✏️ рисуем</button>
      <button class="act-btn act-b" onclick="confirmClear()">🗑 очистить</button>
    </div>
  </div>
</div>

<script>
const COLORS=['#FF6B6B','#FFE600','#6B8FFF','#00FF88','#FF9F43','#A29BFE','#FF4D9E','#00CEC9','#FDCB6E','#E17055'];
let ws, myName, roomId, myColor='#FFE600', myIdx=0;
let dCanvas, dCtx, rCanvas, rCtx;
let markerX=400, markerY=300;
let penDown=true;
let players=[];
let joystickActive=false, joystickStart={x:0,y:0};
let currentVector={x:0,y:0};
let vectorInterval=null;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function joinRoom(){
  roomId=document.getElementById('room-id').value.trim().toUpperCase();
  if(!roomId){alert('Введи код комнаты!');return;}
  // Generate random name so server still tracks players
  myName='player_'+Math.random().toString(36).substring(2,6);
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/ws/${roomId}/${myName}`);
  ws.onopen=()=>showScreen('s-waiting');
  ws.onmessage=e=>handleMessage(JSON.parse(e.data));
  ws.onclose=()=>{alert('Соединение потеряно. Перезайди.');showScreen('s-join');}
}

function handleMessage(msg){
  if(msg.type==='state'||msg.type==='players'){
    players=msg.players||[];
    updatePlayersList(players);
    myIdx=players.indexOf(myName);
    myColor=COLORS[myIdx>=0?myIdx%COLORS.length:0];
    updateJoystickColor();
    if(msg.type==='state'){
      markerX=msg.marker?.x||400; markerY=msg.marker?.y||300;
    }
    if(document.getElementById('s-game').classList.contains('active')) drawScene();
  }
  else if(msg.type==='marker'){
    if(penDown&&msg.drawing){dCtx.lineTo(msg.x,msg.y);dCtx.stroke();}
    dCtx.beginPath();dCtx.moveTo(msg.x,msg.y);
    markerX=msg.x; markerY=msg.y;
    drawRopes();
  }
  else if(msg.type==='penup'){penDown=false;dCtx.beginPath();}
  else if(msg.type==='pendown'){penDown=true;dCtx.beginPath();dCtx.moveTo(markerX,markerY);}
  else if(msg.type==='clear'){
    dCtx.fillStyle='#fff';dCtx.fillRect(0,0,dCanvas.width,dCanvas.height);
    dCtx.beginPath();markerX=dCanvas.width/2;markerY=dCanvas.height/2;penDown=true;drawRopes();
  }
}

function updatePlayersList(pl){
  const list=document.getElementById('players-list');
  list.innerHTML=pl.map((p,i)=>`<div class="player-chip" style="border-color:${COLORS[i%COLORS.length]};color:${COLORS[i%COLORS.length]}">${p}</div>`).join('');
}

function updateJoystickColor(){
  const base=document.getElementById('jbase');
  const knob=document.getElementById('jknob');
  const lbl=document.getElementById('rope-label');
  base.style.borderColor=myColor;
  knob.style.background=myColor;
  knob.style.boxShadow=`0 0 12px ${myColor}`;
  lbl.style.color=myColor;
}

function goToGame(){
  showScreen('s-game');
  setTimeout(()=>{setupCanvases();setupJoystick();updateJoystickColor();drawScene();},50);
}

function setupCanvases(){
  const area=document.getElementById('game-area');
  const W=area.clientWidth, H=area.clientHeight;
  dCanvas=document.getElementById('drawing-canvas');
  rCanvas=document.getElementById('rope-canvas');
  dCanvas.width=rCanvas.width=W;
  dCanvas.height=rCanvas.height=H;
  dCtx=dCanvas.getContext('2d');
  rCtx=rCanvas.getContext('2d');
  dCtx.fillStyle='#fff';dCtx.fillRect(0,0,W,H);
  dCtx.strokeStyle='#111';dCtx.lineWidth=3;dCtx.lineCap='round';dCtx.lineJoin='round';
  markerX=W/2; markerY=H/2;
  dCtx.beginPath();dCtx.moveTo(markerX,markerY);
}

function getPlayerAnchors(){
  const W=dCanvas.width, H=dCanvas.height;
  const cx=W/2, cy=H/2;
  const rx=W/2-22, ry=H/2-22;
  const n=players.length||1;
  return players.map((_,i)=>{
    const angle=(i/n)*Math.PI*2-Math.PI/2;
    return {x:cx+rx*Math.cos(angle), y:cy+ry*Math.sin(angle)};
  });
}

function drawPencil(ctx, x, y, deg){
  ctx.save();ctx.translate(x,y);ctx.rotate(deg*Math.PI/180);
  const s=0.52;ctx.scale(s,s);
  // eraser
  ctx.fillStyle='#F5C842';ctx.strokeStyle='#111';ctx.lineWidth=3;
  ctx.beginPath();ctx.roundRect(-16,-108,32,20,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.roundRect(-10,-106,8,14,4);ctx.fill();
  // metal band
  ctx.fillStyle='#C0C0C0';ctx.strokeStyle='#111';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.roundRect(-17,-90,34,26,3);ctx.fill();ctx.stroke();
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-17,-84+i*6);ctx.lineTo(17,-84+i*6);ctx.strokeStyle='#999';ctx.lineWidth=1.5;ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.roundRect(-12,-88,6,22,3);ctx.fill();
  // body
  ctx.fillStyle='#FF4444';ctx.strokeStyle='#111';ctx.lineWidth=3;
  ctx.beginPath();ctx.roundRect(-17,-66,34,112,6);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.beginPath();ctx.roundRect(-12,-62,8,100,4);ctx.fill();
  ctx.fillStyle='rgba(180,0,0,0.25)';ctx.beginPath();ctx.roundRect(10,-62,5,100,2);ctx.fill();
  // wood
  ctx.fillStyle='#F5C842';ctx.strokeStyle='#111';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(-17,46);ctx.lineTo(17,46);ctx.lineTo(12,82);ctx.lineTo(-12,82);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.strokeStyle='#c8a000';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-17,46);ctx.lineTo(-12,82);ctx.stroke();
  ctx.beginPath();ctx.moveTo(17,46);ctx.lineTo(12,82);ctx.stroke();
  // tip
  ctx.fillStyle='#cc0000';ctx.strokeStyle='#111';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-12,82);ctx.lineTo(12,82);ctx.lineTo(0,108);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#222';ctx.strokeStyle='#111';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-5,88);ctx.lineTo(5,88);ctx.lineTo(0,108);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.restore();
}

function drawRopes(){
  if(!rCtx)return;
  rCtx.clearRect(0,0,rCanvas.width,rCanvas.height);
  const anchors=getPlayerAnchors();
  // draw ropes
  players.forEach((_,i)=>{
    const a=anchors[i];
    const color=COLORS[i%COLORS.length];
    const ox=markerX+14*Math.cos((i/players.length)*Math.PI*2-Math.PI/2);
    const oy=markerY+14*Math.sin((i/players.length)*Math.PI*2-Math.PI/2);
    rCtx.beginPath();rCtx.moveTo(ox,oy);
    const cpx=(ox+a.x)/2+(a.y-oy)*0.1;
    const cpy=(oy+a.y)/2+(ox-a.x)*0.1;
    rCtx.quadraticCurveTo(cpx,cpy,a.x,a.y);
    rCtx.strokeStyle=color;rCtx.lineWidth=2.5;rCtx.lineCap='round';rCtx.stroke();
  });
  // draw pencil
  drawPencil(rCtx,markerX,markerY,-35);
  // draw anchor dots
  players.forEach((_,i)=>{
    const a=anchors[i];
    const color=COLORS[i%COLORS.length];
    rCtx.beginPath();rCtx.arc(a.x,a.y,16,0,Math.PI*2);
    rCtx.fillStyle=color+'44';rCtx.fill();
    rCtx.beginPath();rCtx.arc(a.x,a.y,11,0,Math.PI*2);
    rCtx.fillStyle=color;rCtx.fill();
    rCtx.strokeStyle='#111';rCtx.lineWidth=2.5;rCtx.stroke();
  });
}

function drawScene(){drawRopes();}

function setupJoystick(){
  const base=document.getElementById('jbase');
  const knob=document.getElementById('jknob');
  const R=28;
  function getPos(e){if(e.touches)return{x:e.touches[0].clientX,y:e.touches[0].clientY};return{x:e.clientX,y:e.clientY};}
  function onStart(e){e.preventDefault();joystickActive=true;const p=getPos(e);joystickStart={x:p.x,y:p.y};vectorInterval=setInterval(sendVector,50);}
  function onMove(e){
    if(!joystickActive)return;e.preventDefault();
    const p=getPos(e);let dx=p.x-joystickStart.x,dy=p.y-joystickStart.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>R){dx=dx/dist*R;dy=dy/dist*R;}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    currentVector={x:dx/R,y:dy/R};
  }
  function onEnd(e){e.preventDefault();joystickActive=false;knob.style.transform='translate(-50%,-50%)';currentVector={x:0,y:0};clearInterval(vectorInterval);}
  base.addEventListener('touchstart',onStart,{passive:false});
  base.addEventListener('touchmove',onMove,{passive:false});
  base.addEventListener('touchend',onEnd,{passive:false});
  base.addEventListener('mousedown',onStart);
  window.addEventListener('mousemove',e=>{if(joystickActive)onMove(e);});
  window.addEventListener('mouseup',e=>{if(joystickActive)onEnd(e);});
}

function sendVector(){
  if(!ws||ws.readyState!==1)return;
  if(Math.abs(currentVector.x)<0.05&&Math.abs(currentVector.y)<0.05)return;
  ws.send(JSON.stringify({type:'vector',x:currentVector.x,y:currentVector.y}));
}
function sendCmd(type){ws&&ws.send(JSON.stringify({type}));}
function confirmClear(){if(confirm('Очистить холст для всех?'))sendCmd('clear');}
</script>
</body>
</html>
